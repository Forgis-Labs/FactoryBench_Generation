name: factorybench
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.11
  - pip>=23.0

  # Core dependencies
  - click>=8.1.7
  - fastapi>=0.115.0
  - uvicorn>=0.30.0
  - pydantic>=2.8.0
  - python-dotenv>=1.0.1
  - numpy>=1.26.0
  - matplotlib>=3.8.0
  - seaborn>=0.13.0

  # Data processing
  - pandas>=2.1.0
  - openpyxl>=3.1.0
  - scipy>=1.11.0
  - h5py>=3.10.0

  # Development tools (optional)
  - pytest>=7.4.0
  - ruff>=0.6.0
  - mypy>=1.11.0

  # Pip-only packages
  - pip:
      - datasets>=2.20.0
      - openai>=1.43.0
